<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clear Pass — Sentinel-2 Overpass Predictor</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <header>
        <h1>Clear Pass</h1>
        <p class="subtitle">Sentinel-2 clear-sky overpass predictor</p>
      </header>

      <section id="location-info">
        <h2>Location</h2>
        <p class="hint">Click the map to pick a location</p>
        <div id="coords-display" class="coords hidden">
          <span id="lat-display"></span>, <span id="lon-display"></span>
        </div>
      </section>

      <section id="controls">
        <div class="control-group">
          <label for="threshold">Max cloud cover</label>
          <div class="range-wrapper">
            <input type="range" id="threshold" min="0" max="100" value="20">
            <span id="threshold-value">20%</span>
          </div>
        </div>
        <div class="control-group">
          <label for="days">Forecast days</label>
          <div class="range-wrapper">
            <input type="range" id="days" min="1" max="16" value="10">
            <span id="days-value">10</span>
          </div>
        </div>
        <button id="predict-btn" disabled>Find Clear Passes</button>
      </section>

      <section id="results">
        <div id="loading" class="hidden">
          <div class="spinner"></div>
          <p>Computing satellite passes&hellip;</p>
        </div>
        <div id="results-content"></div>
      </section>

      <footer>
        <p>Map tiles by <a href="https://openfreemap.org" target="_blank" rel="noopener">OpenFreeMap</a></p>
        <p>Weather data from <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a></p>
      </footer>
    </aside>

    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/satellite.js@5.0.0/dist/satellite.min.js"></script>
  <script src="js/passes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
